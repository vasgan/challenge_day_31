name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number"
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch PR metadata, files and diff
        id: pr_data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" > pr.json

          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER/files?per_page=100" > files.json

          curl -sS \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3.diff" \
            "https://api.github.com/repos/$REPO/pulls/$PR_NUMBER" > diff.txt

          jq -r '[.[] | "- " + .filename + " [" + .status + "] +" + (.additions|tostring) + "/-" + (.deletions|tostring)] | join("\n")' files.json > changed_files.txt

      - name: Build prompt context
        shell: bash
        run: |
          set -euo pipefail
          README_TEXT=""
          if [ -f README.md ]; then
            README_TEXT=$(head -c 12000 README.md)
          fi

          PR_TITLE=$(jq -r '.title' pr.json)
          PR_BODY=$(jq -r '.body // ""' pr.json)
          BASE_BRANCH=$(jq -r '.base.ref' pr.json)
          HEAD_BRANCH=$(jq -r '.head.ref' pr.json)
          AUTHOR=$(jq -r '.user.login' pr.json)
          PR_URL=$(jq -r '.html_url' pr.json)

          {
            echo "Project context:";
            echo "- Repository: ${{ github.repository }}";
            echo;
            echo "Pull request context:";
            echo "- Title: $PR_TITLE";
            echo "- Author: $AUTHOR";
            echo "- Base branch: $BASE_BRANCH";
            echo "- Head branch: $HEAD_BRANCH";
            echo "- URL: $PR_URL";
            echo "- Body: $PR_BODY";
            echo;
            echo "Changed files:";
            cat changed_files.txt;
            echo;
            echo "Relevant documentation (README excerpt):";
            echo "$README_TEXT";
            echo;
            echo "Diff:";
            head -c 30000 diff.txt;
            echo;
            echo "Task: Return sections exactly:";
            echo "1) Potential Bugs";
            echo "2) Architecture Concerns";
            echo "3) Recommendations";
            echo "4) Overall Verdict";
          } > review_context.txt

      - name: Ask OpenAI for review
        id: review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          CONTEXT=$(cat review_context.txt)
          PAYLOAD=$(jq -n \
            --arg model "gpt-5-mini" \
            --arg system "You are a senior code reviewer. Use only provided diff, changed files, and retrieved project docs. If evidence is insufficient, say so explicitly." \
            --arg user "$CONTEXT" \
            '{
              model: $model,
              input: [
                {role: "system", content: [{type: "input_text", text: $system}]},
                {role: "user", content: [{type: "input_text", text: $user}]}
              ]
            }')

          curl -sS https://api.openai.com/v1/responses \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" > openai_response.json

          REVIEW_TEXT=$(jq -r '.output[]?.content[]?.text // empty' openai_response.json | sed '/^$/d' || true)
          if [ -z "$REVIEW_TEXT" ]; then
            REVIEW_TEXT="AI review failed: empty response."
          fi

          {
            echo "body<<EOF"
            echo "### AI PR Review"
            echo
            echo "$REVIEW_TEXT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post review comment to PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          REVIEW_BODY: ${{ steps.review.outputs.body }}
        shell: bash
        run: |
          set -euo pipefail
          curl -sS -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "$(jq -n --arg body \"$REVIEW_BODY\" '{body: $body}')"
